<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="color-scheme" content="light">
<meta name="darkreader-lock">
<title>Admin · Erben Driessen</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@500;700;800&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{ --bg:#0D1117; --slate:#161b22; --slate2:#1c2230; --line:#222b36; --line2:#2f3a48;
    --text:#e8edf3; --dim:#9fb0c3; --green:#00FF9C; --red:#F2495C; --blue:#58A6FF; --ease:cubic-bezier(.22,1,.36,1); }
  *{box-sizing:border-box;}
  body{ margin:0; background:var(--bg); color:var(--text); font-family:"Poppins",system-ui,sans-serif;
    -webkit-font-smoothing:antialiased; }
  .mono{ font-family:"JetBrains Mono",monospace; }
  a{ color:var(--blue); }
  .wrap{ max-width:980px; margin:0 auto; padding:32px clamp(16px,4vw,40px) 80px; }
  .top{ display:flex; align-items:center; justify-content:space-between; padding-bottom:24px; border-bottom:1px solid var(--line); }
  .brand{ font-family:"JetBrains Mono",monospace; font-weight:800; font-size:17px; display:flex; align-items:center; gap:9px; }
  .brand .dot{ width:9px;height:9px;border-radius:50%;background:var(--green);box-shadow:0 0 12px var(--green); }
  .top .who{ font-family:"JetBrains Mono",monospace; font-size:12.5px; color:var(--dim); display:flex; align-items:center; gap:14px; }
  .btn{ font-family:"JetBrains Mono",monospace; font-size:13px; font-weight:700; cursor:pointer; border:none;
    padding:10px 16px; border-radius:8px; transition:transform .15s, box-shadow .25s, background .2s, border-color .2s; }
  .btn.primary{ background:var(--green); color:#06120c; } .btn.primary:hover{ transform:translateY(-1px); box-shadow:0 8px 20px -8px rgba(0,255,156,.6); }
  .btn.ghost{ background:transparent; color:var(--text); border:1px solid var(--line2); } .btn.ghost:hover{ border-color:var(--green); color:var(--green); }
  .btn.danger{ background:transparent; color:var(--red); border:1px solid rgba(242,73,92,.4); } .btn.danger:hover{ background:rgba(242,73,92,.1); }
  .btn:disabled{ opacity:.5; cursor:default; transform:none; box-shadow:none; }

  /* login */
  .login{ max-width:380px; margin:14vh auto 0; }
  .login h1{ font-size:24px; margin:0 0 6px; }
  .login p{ color:var(--dim); font-size:14px; margin:0 0 26px; }
  .field{ margin-bottom:16px; }
  .field label{ display:block; font-family:"JetBrains Mono",monospace; font-size:12px; color:var(--dim); margin-bottom:7px; letter-spacing:.04em; }
  .field input, .field textarea, .field select{ width:100%; background:var(--slate); border:1px solid var(--line2); color:var(--text);
    border-radius:9px; padding:11px 13px; font-family:"Poppins",sans-serif; font-size:14px; }
  .field input:focus, .field textarea:focus, .field select:focus{ outline:none; border-color:var(--green); }
  .field textarea{ min-height:84px; resize:vertical; }
  .err{ color:var(--red); font-size:13px; min-height:18px; margin-top:4px; font-family:"JetBrains Mono",monospace; }

  /* manager */
  .head{ display:flex; align-items:center; justify-content:space-between; margin:30px 0 18px; }
  .head h1{ font-size:22px; margin:0; }
  .grid2{ display:grid; grid-template-columns:1fr 1.1fr; gap:26px; align-items:start; }
  @media (max-width:820px){ .grid2{ grid-template-columns:1fr; } }
  .panel{ background:var(--slate); border:1px solid var(--line); border-radius:14px; padding:22px; }
  .panel h2{ font-size:15px; margin:0 0 16px; font-family:"JetBrains Mono",monospace; color:var(--dim); text-transform:uppercase; letter-spacing:.1em; }
  .row2{ display:grid; grid-template-columns:1fr 1fr; gap:14px; }
  .check{ display:flex; align-items:center; gap:9px; font-size:14px; color:var(--text); cursor:pointer; }
  .check input{ width:18px; height:18px; accent-color:var(--green); }
  .imgrow{ display:flex; align-items:center; gap:14px; }
  .imgprev{ width:88px; height:56px; border-radius:8px; object-fit:cover; background:var(--slate2); border:1px solid var(--line2); flex:none; }
  .formbtns{ display:flex; gap:10px; margin-top:8px; }

  .plist{ display:flex; flex-direction:column; gap:10px; }
  .pitem{ display:flex; gap:13px; align-items:center; background:var(--slate); border:1px solid var(--line); border-radius:11px; padding:11px; }
  .pitem img{ width:64px; height:44px; border-radius:7px; object-fit:cover; background:var(--slate2); flex:none; }
  .pitem .meta{ flex:1; min-width:0; }
  .pitem .meta h3{ font-size:15px; margin:0 0 3px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .pitem .meta .sub{ font-family:"JetBrains Mono",monospace; font-size:11.5px; color:var(--dim); }
  .pitem .acts{ display:flex; gap:7px; flex:none; }
  .pitem .acts button{ font-size:11.5px; padding:6px 10px; }
  .empty{ color:var(--dim); font-size:14px; font-family:"JetBrains Mono",monospace; padding:8px 2px; }
  .toast{ position:fixed; left:50%; bottom:26px; transform:translateX(-50%) translateY(20px); opacity:0;
    background:var(--slate2); border:1px solid var(--line2); color:var(--text); padding:11px 18px; border-radius:10px;
    font-size:13.5px; transition:opacity .3s, transform .3s; pointer-events:none; z-index:20; }
  .toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .toast.ok{ border-color:rgba(0,255,156,.4); } .toast.bad{ border-color:rgba(242,73,92,.5); color:#ffd7dc; }
  .hidden{ display:none !important; }
</style>
</head>
<body>
<div class="wrap">

  <!-- ===== LOGIN ===== -->
  <section id="loginView">
    <div class="login">
      <div class="brand" style="margin-bottom:34px;"><span class="dot"></span>erben.dev / admin</div>
      <h1>Sign in</h1>
      <p>Manage the projects that show up under “More projects”.</p>
      <form id="loginForm">
        <div class="field"><label>Email</label><input type="email" id="email" autocomplete="username" required></div>
        <div class="field"><label>Password</label><input type="password" id="password" autocomplete="current-password" required></div>
        <button class="btn primary" id="loginBtn" type="submit" style="width:100%;">Sign in</button>
        <div class="err" id="loginErr"></div>
      </form>
      <p style="margin-top:20px;"><a href="index.html">← back to site</a></p>
    </div>
  </section>

  <!-- ===== MANAGER ===== -->
  <section id="adminView" class="hidden">
    <div class="top">
      <div class="brand"><span class="dot"></span>erben.dev / admin</div>
      <div class="who"><span id="whoEmail"></span><button class="btn ghost" id="signOutBtn">Sign out</button></div>
    </div>

    <div class="head"><h1>Projects</h1><button class="btn ghost" id="newBtn">+ New project</button></div>

    <div class="grid2">
      <!-- form -->
      <div class="panel">
        <h2 id="formTitle">New project</h2>
        <form id="projForm">
          <input type="hidden" id="projId">
          <div class="field"><label>Title</label><input type="text" id="f_title" required></div>
          <div class="field"><label>Stack (comma-separated)</label><input type="text" id="f_stack" placeholder="Python, SQL"></div>
          <div class="field"><label>Description</label><textarea id="f_desc"></textarea></div>
          <div class="row2">
            <div class="field"><label>Category</label>
              <select id="f_category">
                <option value="web">Web</option><option value="mobile">Mobile</option>
                <option value="python">Python</option><option value="game">Game</option>
                <option value="tool">Tool</option><option value="data">Data</option><option value="other">Other</option>
              </select>
            </div>
            <div class="field"><label>Year</label><input type="text" id="f_year" placeholder="2026"></div>
          </div>
          <div class="row2">
            <div class="field"><label>Link (optional)</label><input type="text" id="f_link" placeholder="https://..."></div>
            <div class="field"><label>Link label</label><input type="text" id="f_linkLabel" placeholder="View code"></div>
          </div>
          <div class="field">
            <label>Image</label>
            <div class="imgrow">
              <img class="imgprev" id="f_imgprev" alt="">
              <div>
                <input type="file" id="f_imgfile" accept="image/*" style="font-size:12px;">
                <div class="err" id="imgErr" style="min-height:0;"></div>
              </div>
            </div>
            <input type="hidden" id="f_image">
          </div>
          <label class="check" style="margin:6px 0 16px;"><input type="checkbox" id="f_featured"> Featured</label>
          <div class="formbtns">
            <button class="btn primary" id="saveBtn" type="submit">Save project</button>
            <button class="btn ghost" id="cancelBtn" type="button">Clear</button>
          </div>
        </form>
      </div>

      <!-- list -->
      <div class="panel">
        <h2>In the database</h2>
        <div class="plist" id="plist"><p class="empty">Loading…</p></div>
      </div>
    </div>
  </section>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="supabase-client.js"></script>
<script>
(function(){
  var $=function(id){return document.getElementById(id);};
  var loginView=$('loginView'), adminView=$('adminView');
  function toast(msg,kind){ var t=$('toast'); t.textContent=msg; t.className='toast show '+(kind||''); setTimeout(function(){ t.className='toast '+(kind||''); },2600); }

  function waitSb(cb,tries){ if(window.sb&&window.sbAuth&&window.sbProjects) cb();
    else if((tries||0)<30) setTimeout(function(){ waitSb(cb,(tries||0)+1); },150);
    else toast('Could not reach Supabase','bad'); }

  /* ---- auth ---- */
  waitSb(function(){
    window.sbAuth.getUser().then(showFor);
    window.sbAuth.onAuthChange(showFor);
  });
  function showFor(user){
    if(user){ loginView.classList.add('hidden'); adminView.classList.remove('hidden'); $('whoEmail').textContent=user.email; loadList(); }
    else { adminView.classList.add('hidden'); loginView.classList.remove('hidden'); }
  }

  $('loginForm').addEventListener('submit', function(e){
    e.preventDefault(); $('loginErr').textContent=''; var b=$('loginBtn'); b.disabled=true; b.textContent='Signing in…';
    window.sbAuth.signIn($('email').value.trim(), $('password').value).catch(function(err){
      $('loginErr').textContent=err.message||'Sign in failed';
    }).finally(function(){ b.disabled=false; b.textContent='Sign in'; });
  });
  $('signOutBtn').addEventListener('click', function(){ window.sbAuth.signOut(); });

  /* ---- list ---- */
  function loadList(){
    var box=$('plist'); box.innerHTML='<p class="empty">Loading…</p>';
    window.sbProjects.list().then(function(list){
      if(!list.length){ box.innerHTML='<p class="empty">No projects yet. Add your first one →</p>'; return; }
      box.innerHTML='';
      list.forEach(function(p){
        var el=document.createElement('div'); el.className='pitem';
        el.innerHTML='<img src="'+(p.image||'')+'" alt=""><div class="meta"><h3>'+esc(p.title)+'</h3>'
          +'<div class="sub">'+(p.category||'other')+' · '+(p.year||'—')+' · '+((p.stack||[]).join(', ')||'no stack')+(p.featured?' · ★':'')+'</div></div>'
          +'<div class="acts"><button class="btn ghost edit">Edit</button><button class="btn danger del">Delete</button></div>';
        el.querySelector('.edit').addEventListener('click', function(){ fillForm(p); window.scrollTo({top:0,behavior:'smooth'}); });
        el.querySelector('.del').addEventListener('click', function(){ doDelete(p); });
        box.appendChild(el);
      });
    }).catch(function(){ box.innerHTML='<p class="empty">Could not load projects.</p>'; });
  }
  function esc(s){ return (s||'').replace(/[&<>]/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;'}[c];}); }

  /* ---- form ---- */
  function clearForm(){ $('projId').value=''; $('f_title').value=''; $('f_stack').value=''; $('f_desc').value='';
    $('f_category').value='web'; $('f_year').value=new Date().getFullYear(); $('f_link').value=''; $('f_linkLabel').value='';
    $('f_image').value=''; $('f_imgprev').removeAttribute('src'); $('f_featured').checked=false; $('formTitle').textContent='New project'; }
  function fillForm(p){ $('projId').value=p.id; $('f_title').value=p.title||''; $('f_stack').value=(p.stack||[]).join(', ');
    $('f_desc').value=p.desc||''; $('f_category').value=p.category||'web'; $('f_year').value=p.year||'';
    $('f_link').value=p.link||''; $('f_linkLabel').value=p.linkLabel||''; $('f_image').value=p.image||'';
    if(p.image) $('f_imgprev').src=p.image; else $('f_imgprev').removeAttribute('src');
    $('f_featured').checked=!!p.featured; $('formTitle').textContent='Edit project'; }
  $('newBtn').addEventListener('click', function(){ clearForm(); window.scrollTo({top:0,behavior:'smooth'}); });
  $('cancelBtn').addEventListener('click', clearForm);

  $('f_imgfile').addEventListener('change', function(e){
    var file=e.target.files[0]; if(!file) return; $('imgErr').textContent='Uploading…';
    window.sbProjects.uploadImage(file).then(function(url){ $('f_image').value=url; $('f_imgprev').src=url; $('imgErr').textContent=''; })
      .catch(function(err){ $('imgErr').textContent=err.message||'Upload failed'; });
  });

  $('projForm').addEventListener('submit', function(e){
    e.preventDefault();
    var payload={ title:$('f_title').value.trim(),
      stack:$('f_stack').value.split(',').map(function(s){return s.trim();}).filter(Boolean),
      desc:$('f_desc').value.trim(), category:$('f_category').value, year:$('f_year').value.trim(),
      link:$('f_link').value.trim()||null, linkLabel:$('f_linkLabel').value.trim()||null,
      image:$('f_image').value||null, featured:$('f_featured').checked };
    var id=$('projId').value, b=$('saveBtn'); b.disabled=true; b.textContent='Saving…';
    var op=id? window.sbProjects.update(id,payload) : window.sbProjects.create(payload);
    op.then(function(){ toast(id?'Project updated':'Project added','ok'); clearForm(); loadList(); })
      .catch(function(err){ toast(err.message||'Save failed','bad'); })
      .finally(function(){ b.disabled=false; b.textContent='Save project'; });
  });

  function doDelete(p){
    if(!confirm('Delete “'+p.title+'”? This cannot be undone.')) return;
    window.sbProjects.remove(p.id).then(function(){ toast('Project deleted','ok'); loadList(); })
      .catch(function(err){ toast(err.message||'Delete failed','bad'); });
  }
})();
</script>
</body>
</html>
